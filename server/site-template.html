<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AWS Cloud Engineering — Class Summaries</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0f1e; color: #e2e8f0; min-height: 100vh; line-height: 1.65; }

  .shell { display: flex; min-height: 100vh; }

  .sidebar { width: 220px; flex-shrink: 0; background: #0f172a; border-right: 1px solid #1e293b; position: sticky; top: 0; height: 100vh; overflow-y: auto; padding: 1.5rem 0; }
  .sidebar-logo { padding: 0 1.25rem 1.25rem; border-bottom: 1px solid #1e293b; margin-bottom: 1rem; }
  .sidebar-logo h1 { font-size: 0.9rem; color: #93c5fd; font-weight: 700; line-height: 1.3; }
  .sidebar-logo p { font-size: 0.72rem; color: #475569; margin-top: 3px; }
  .sidebar-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.1em; color: #475569; padding: 0 1.25rem; margin-bottom: 0.4rem; }

  .day-btn { display: block; width: 100%; text-align: left; padding: 0.5rem 1.25rem; background: none; border: none; color: #94a3b8; font-size: 0.82rem; cursor: pointer; transition: all 0.12s; border-left: 2px solid transparent; }
  .day-btn:hover { background: #1e293b; color: #e2e8f0; }
  .day-btn.active { background: #1e3a5f; color: #dbeafe; border-left-color: #3b82f6; font-weight: 600; }
  .day-btn .date { display: block; }
  .day-btn .topics { font-size: 0.7rem; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .day-btn.active .topics { color: #7dd3fc; }

  .main { flex: 1; min-width: 0; padding: 2rem 2.5rem; max-width: 900px; }

  .page-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.75rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  .page-header h2 { font-size: 1.25rem; color: #f1f5f9; }
  .page-header .meta { font-size: 0.78rem; color: #64748b; margin-top: 3px; }
  .badge { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 12px; background: #1e3a5f; color: #7dd3fc; border: 1px solid #2563eb44; font-weight: 600; }

  .md-body h1 { font-size: 1.35rem; color: #f1f5f9; margin: 0.5rem 0 0.75rem; }
  .md-body h2 { font-size: 1.05rem; color: #93c5fd; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid #1e293b; padding-bottom: 0.3rem; }
  .md-body h3 { font-size: 0.95rem; color: #cbd5e1; margin: 1rem 0 0.3rem; }
  .md-body p { margin: 0.35rem 0; }
  .md-body ul { margin: 0.3rem 0 0.75rem; padding-left: 1.4rem; }
  .md-body li { margin-bottom: 4px; }
  .md-body strong { color: #f1f5f9; }
  .md-body em { color: #94a3b8; font-style: italic; }
  .md-body code { background: #1e293b; color: #7dd3fc; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.85em; font-family: 'Fira Code', monospace; }
  .md-body blockquote { border-left: 3px solid #3b82f6; margin: 0.75rem 0; padding: 0.4rem 0.85rem; color: #94a3b8; background: #0f172a; border-radius: 0 6px 6px 0; }
  .md-body hr { border: none; border-top: 1px solid #1e293b; margin: 1.25rem 0; }
  .md-body table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.85rem; }
  .md-body th { background: #1e293b; color: #93c5fd; padding: 0.45rem 0.75rem; text-align: left; border: 1px solid #334155; }
  .md-body td { padding: 0.4rem 0.75rem; border: 1px solid #1e293b; }
  .md-body tr:nth-child(even) td { background: #0f172a; }
  .mermaid-wrap { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 1rem; margin: 0.75rem 0 1rem; overflow-x: auto; position: relative; cursor: zoom-in; }
  .mermaid-wrap:hover { border-color: #3b82f6; }
  .zoom-hint { position: absolute; top: 6px; right: 8px; font-size: 0.67rem; color: #475569; pointer-events: none; user-select: none; }
  .mermaid-wrap:hover .zoom-hint { color: #7dd3fc; }

  /* Lightbox */
  #diagram-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
  #diagram-canvas { position: relative; width: 100%; height: 100%; overflow: hidden; cursor: grab; }
  #diagram-canvas.grabbing { cursor: grabbing; }
  #diagram-inner { position: absolute; top: 50%; left: 50%; transform-origin: center center; }
  #diagram-inner svg { display: block; filter: drop-shadow(0 0 24px rgba(59,130,246,0.2)); }
  #overlay-controls { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; align-items: center; background: #0f172a; border: 1px solid #334155; border-radius: 12px; padding: 6px 10px; z-index: 10000; }
  .ov-btn { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; font-size: 1rem; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .ov-btn:hover { background: #2d3f55; color: #f1f5f9; }
  #zoom-label { font-size: 0.78rem; color: #94a3b8; min-width: 44px; text-align: center; }
  #overlay-close { position: fixed; top: 16px; right: 20px; background: #1e293b; border: 1px solid #334155; color: #94a3b8; font-size: 1.2rem; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10000; }
  #overlay-close:hover { background: #2d3f55; color: #f1f5f9; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid #1e293b; padding-bottom: 0; }
  .tab-btn { padding: 0.5rem 1.1rem; background: none; border: none; border-bottom: 2px solid transparent; color: #64748b; font-size: 0.88rem; cursor: pointer; transition: all 0.15s; margin-bottom: -1px; font-weight: 500; }
  .tab-btn:hover { color: #cbd5e1; }
  .tab-btn.active { color: #93c5fd; border-bottom-color: #3b82f6; font-weight: 600; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .mcq-section { margin-top: 0; }
  .mcq-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .mcq-header h2 { font-size: 1.05rem; color: #93c5fd; }
  .mcq-header small { font-size: 0.72rem; color: #475569; }
  .check-all-btn { padding: 0.35rem 0.85rem; border-radius: 6px; cursor: pointer; background: #1e3a5f; color: #dbeafe; border: 1px solid #3b82f6; font-size: 0.82rem; font-weight: 600; }
  .check-all-btn:hover { background: #1d4ed8; }

  .score-banner { padding: 0.6rem 1rem; border-radius: 8px; font-weight: 600; font-size: 0.9rem; margin-bottom: 1rem; display: none; }
  .score-banner.pass { background: #052e16; border: 1px solid #16a34a; color: #86efac; }
  .score-banner.fail { background: #450a0a; border: 1px solid #dc2626; color: #fca5a5; }

  .q-card { background: #0b1120; border: 1px solid #1e293b; border-radius: 10px; padding: 1.1rem 1.25rem; margin-bottom: 1rem; }
  .q-top { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 0.75rem; }
  .q-num { min-width: 24px; height: 24px; border-radius: 50%; background: #1e293b; color: #94a3b8; font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .q-diff { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .diff-associate { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
  .diff-practitioner { background: #0369a122; color: #38bdf8; border: 1px solid #0369a144; }
  .q-text { color: #e2e8f0; font-size: 0.9rem; line-height: 1.55; flex: 1; }

  .options { display: flex; flex-direction: column; gap: 6px; margin-left: 32px; }
  .opt-btn { text-align: left; padding: 0.45rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; line-height: 1.45; background: #0f172a; border: 1px solid #1e293b; color: #cbd5e1; transition: all 0.1s; width: 100%; }
  .opt-btn:hover:not([disabled]) { background: #1e293b; color: #e2e8f0; }
  .opt-btn.selected { background: #1e3a5f; border-color: #3b82f6; color: #dbeafe; }
  .opt-btn.correct { background: #052e16; border-color: #16a34a; color: #86efac; }
  .opt-btn.wrong { background: #450a0a; border-color: #dc2626; color: #fca5a5; }
  .opt-btn.dimmed { color: #334155; border-color: #1e293b; }
  .opt-btn[disabled] { cursor: default; }

  .q-footer { margin-left: 32px; margin-top: 8px; }
  .submit-btn { padding: 0.3rem 0.7rem; border-radius: 6px; cursor: pointer; background: #1e3a5f; color: #dbeafe; border: 1px solid #3b82f6; font-size: 0.78rem; }
  .submit-btn:disabled { background: #0f172a; color: #475569; border-color: #1e293b; cursor: default; }
  .explanation { display: none; margin-top: 10px; background: #0f172a; border: 1px solid #1e3a5f; border-radius: 6px; padding: 0.6rem 0.85rem; font-size: 0.82rem; color: #94a3b8; line-height: 1.6; }
  .explanation strong { color: #7dd3fc; }

  /* ── Mobile ── */
  .mobile-header { display: none; }
  .mobile-nav-bar { display: none; }

  @media (max-width: 680px) {
    .sidebar { display: none; }
    .main { padding: 1rem 0.9rem; max-width: 100%; }

    /* Top bar — title only */
    .mobile-header {
      display: flex; align-items: center;
      background: #0f172a; border-bottom: 1px solid #1e293b;
      padding: 0.75rem 1rem; position: sticky; top: 0; z-index: 100;
    }
    .mobile-header h1 { font-size: 0.88rem; color: #93c5fd; font-weight: 700; }
    .mobile-menu-btn { display: none; }

    /* Day picker — always visible */
    .mobile-nav-bar {
      display: block; background: #0f172a; border-bottom: 1px solid #1e293b;
      overflow-x: auto; white-space: nowrap; padding: 0.5rem 0.75rem;
      -webkit-overflow-scrolling: touch; position: sticky; top: 44px; z-index: 99;
    }
    .mobile-day-chip {
      display: inline-block; padding: 0.35rem 0.85rem; margin-right: 6px;
      background: #1e293b; border: 1px solid #334155; border-radius: 20px;
      color: #94a3b8; font-size: 0.8rem; cursor: pointer; white-space: nowrap;
    }
    .mobile-day-chip.active { background: #1e3a5f; border-color: #3b82f6; color: #dbeafe; font-weight: 600; }

    /* Content adjustments */
    .page-header { padding: 0.9rem 1rem; }
    .page-header h2 { font-size: 1rem; }
    .md-body h2 { font-size: 0.97rem; }
    .md-body h3 { font-size: 0.88rem; }
    .md-body code { font-size: 0.8em; word-break: break-all; }
    .md-body table { font-size: 0.78rem; display: block; overflow-x: auto; }
    .mermaid-wrap { padding: 0.6rem; }
    .q-card { padding: 0.9rem 0.9rem; }
    .q-text { font-size: 0.85rem; }
    .opt-btn { font-size: 0.82rem; padding: 0.55rem 0.75rem; }
    .tabs { gap: 2px; }
    .tab-btn { font-size: 0.8rem; padding: 0.45rem 0.75rem; }

    /* Overlay controls bigger for fingers */
    .ov-btn { width: 42px; height: 42px; font-size: 1.2rem; }
    #overlay-close { width: 42px; height: 42px; }
  }
</style>
</head>
<body>
<!-- Diagram zoom overlay -->
<div id="diagram-overlay">
  <div id="diagram-canvas">
    <div id="diagram-inner"></div>
  </div>
  <button id="overlay-close" title="Close (Esc)">✕</button>
  <div id="overlay-controls">
    <button class="ov-btn" id="btn-zoom-out" title="Zoom out">−</button>
    <span id="zoom-label">100%</span>
    <button class="ov-btn" id="btn-zoom-in" title="Zoom in">+</button>
    <button class="ov-btn" id="btn-reset" title="Reset" style="font-size:0.75rem;width:auto;padding:0 10px;">Reset</button>
  </div>
</div>

<header class="mobile-header">
  <h1>☁️ AWS Class Summaries</h1>
  <button class="mobile-menu-btn" id="mobile-menu-btn">📅 Days</button>
</header>
<div class="mobile-nav-bar" id="mobile-nav-bar"></div>

<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>☁️ AWS Cloud Engineering</h1>
      <p>DCI · Class Summaries</p>
    </div>
    <div class="sidebar-label">Class Days</div>
    <div id="nav"></div>
  </nav>
  <main class="main" id="main"></main>
</div>
<script>
mermaid.initialize({ startOnLoad: false, theme: 'dark' });

const DAYS = __DAYS__;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function inlineHtml(text) {
  return escHtml(text)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/_([^_]+)_/g, '<em>$1</em>');
}

function mdToHtml(md) {
  const parts = [];
  const FENCE = '```';
  const fenceRe = new RegExp('^' + FENCE + 'mermaid\\n([\\s\\S]*?)^' + FENCE, 'gm');
  let last = 0, m;
  while ((m = fenceRe.exec(md)) !== null) {
    if (m.index > last) parts.push({ type: 'md', src: md.slice(last, m.index) });
    parts.push({ type: 'mermaid', src: m[1].trim() });
    last = m.index + m[0].length;
  }
  if (last < md.length) parts.push({ type: 'md', src: md.slice(last) });

  let html = '';
  parts.forEach(function(p) {
    if (p.type === 'mermaid') {
      html += '<div class="mermaid-wrap"><div class="mermaid">' + escHtml(p.src) + '</div><span class="zoom-hint">🔍 click to zoom</span></div>';
      return;
    }
    const lines = p.src.split('\n');
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      // Table
      if (/^\|/.test(line) && i + 1 < lines.length && /^\|[-| :]+\|/.test(lines[i+1])) {
        const headers = line.split('|').slice(1,-1).map(function(c){ return c.trim(); });
        i += 2;
        let t = '<table><thead><tr>' + headers.map(function(h){ return '<th>' + inlineHtml(h) + '</th>'; }).join('') + '</tr></thead><tbody>';
        while (i < lines.length && /^\|/.test(lines[i])) {
          const cells = lines[i].split('|').slice(1,-1).map(function(c){ return c.trim(); });
          t += '<tr>' + cells.map(function(c){ return '<td>' + inlineHtml(c) + '</td>'; }).join('') + '</tr>';
          i++;
        }
        html += t + '</tbody></table>';
        continue;
      }
      if (/^# /.test(line))  { html += '<h1>' + inlineHtml(line.slice(2)) + '</h1>'; i++; continue; }
      if (/^## /.test(line)) { html += '<h2>' + inlineHtml(line.slice(3)) + '</h2>'; i++; continue; }
      if (/^### /.test(line)){ html += '<h3>' + inlineHtml(line.slice(4)) + '</h3>'; i++; continue; }
      if (/^---$/.test(line.trim())) { html += '<hr>'; i++; continue; }
      if (/^> /.test(line))  { html += '<blockquote>' + inlineHtml(line.slice(2)) + '</blockquote>'; i++; continue; }
      if (/^\s*- /.test(line)) {
        html += '<ul>';
        while (i < lines.length && /^\s*- /.test(lines[i])) {
          html += '<li>' + inlineHtml(lines[i].replace(/^\s*- /, '')) + '</li>';
          i++;
        }
        html += '</ul>';
        continue;
      }
      if (line.trim() === '') { i++; continue; }
      html += '<p>' + inlineHtml(line) + '</p>';
      i++;
    }
  });
  return html;
}

function renderDay(day, activeTab) {
  activeTab = activeTab || 'summary';
  document.querySelectorAll('.day-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.date === day.date);
  });

  var d = new Date(day.date + 'T12:00:00');
  var label = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  var firstLine = day.text.split('\n').find(function(l){ return l.startsWith('_Topic:') || l.startsWith('# '); }) || '';
  var topicMeta = firstLine.replace(/^_Topic:\s*/, '').replace(/_$/, '').replace(/^# /, '');

  var main = document.getElementById('main');
  main.innerHTML = '';

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.innerHTML = '<div><h2>' + escHtml(label) + '</h2><div class="meta">' + escHtml(topicMeta.slice(0,120)) + '</div></div><span class="badge">☁️ AWS · DCI</span>';
  main.appendChild(hdr);

  // Tabs
  var tabs = document.createElement('div');
  tabs.className = 'tabs';
  var tabSummary = document.createElement('button');
  tabSummary.className = 'tab-btn' + (activeTab === 'summary' ? ' active' : '');
  tabSummary.textContent = '📄 Summary';
  var tabMCQ = document.createElement('button');
  tabMCQ.className = 'tab-btn' + (activeTab === 'mcq' ? ' active' : '');
  tabMCQ.textContent = '📝 Practice MCQs (' + (day.mcqs ? day.mcqs.length : 0) + ')';
  tabs.appendChild(tabSummary);
  if (day.mcqs && day.mcqs.length) tabs.appendChild(tabMCQ);
  main.appendChild(tabs);

  // Summary panel
  var panelSummary = document.createElement('div');
  panelSummary.className = 'tab-panel' + (activeTab === 'summary' ? ' active' : '');
  var body = document.createElement('div');
  body.className = 'md-body';
  body.innerHTML = mdToHtml(day.text);
  panelSummary.appendChild(body);
  main.appendChild(panelSummary);

  mermaid.run({ nodes: body.querySelectorAll('.mermaid') }).then(function() {
    body.querySelectorAll('.mermaid-wrap').forEach(function(wrap) {
      wrap.addEventListener('click', function() {
        var svg = wrap.querySelector('svg');
        if (svg) openDiagram(svg);
      });
    });
  });

  // MCQ panel
  var panelMCQ = document.createElement('div');
  panelMCQ.className = 'tab-panel' + (activeTab === 'mcq' ? ' active' : '');
  if (day.mcqs && day.mcqs.length) {
    panelMCQ.appendChild(buildMCQ(day.mcqs));
    main.appendChild(panelMCQ);
  }

  // Tab switching
  tabSummary.addEventListener('click', function() {
    tabSummary.classList.add('active'); tabMCQ.classList.remove('active');
    panelSummary.classList.add('active'); panelMCQ.classList.remove('active');
    window.scrollTo(0, 0);
  });
  tabMCQ.addEventListener('click', function() {
    tabMCQ.classList.add('active'); tabSummary.classList.remove('active');
    panelMCQ.classList.add('active'); panelSummary.classList.remove('active');
    window.scrollTo(0, 0);
  });

  window.scrollTo(0, 0);
}

function buildMCQ(questions) {
  var section = document.createElement('div');
  section.className = 'mcq-section';

  var hdr = document.createElement('div');
  hdr.className = 'mcq-header';
  hdr.innerHTML = '<div><h2>📝 Practice MCQs</h2><small>SAA-C03 / CLF-C02 style · ' + questions.length + ' questions</small></div>';
  var checkBtn = document.createElement('button');
  checkBtn.className = 'check-all-btn';
  checkBtn.textContent = 'Check all';
  hdr.appendChild(checkBtn);
  section.appendChild(hdr);

  var scoreBanner = document.createElement('div');
  scoreBanner.className = 'score-banner';
  section.appendChild(scoreBanner);

  var state = {};

  questions.forEach(function(q, qi) {
    state[q.id] = { chosen: null, submitted: false };
    var card = document.createElement('div');
    card.className = 'q-card';

    var diffClass = q.difficulty === 'associate' ? 'diff-associate' : 'diff-practitioner';
    var diffLabel = q.difficulty === 'associate' ? 'SAA-C03' : 'CLF-C02';

    var top = document.createElement('div');
    top.className = 'q-top';
    top.innerHTML = '<span class="q-num">' + (qi+1) + '</span><span class="q-diff ' + diffClass + '">' + diffLabel + '</span><span class="q-text">' + escHtml(q.question) + '</span>';
    card.appendChild(top);

    var opts = document.createElement('div');
    opts.className = 'options';
    card.appendChild(opts);

    var footer = document.createElement('div');
    footer.className = 'q-footer';
    var subBtn = document.createElement('button');
    subBtn.className = 'submit-btn';
    subBtn.textContent = 'Submit';
    subBtn.disabled = true;
    footer.appendChild(subBtn);
    var expEl = document.createElement('div');
    expEl.className = 'explanation';
    expEl.innerHTML = '<strong>Explanation:</strong> ' + escHtml(q.explanation);
    footer.appendChild(expEl);
    card.appendChild(footer);

    ['A','B','C','D'].forEach(function(letter) {
      var btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.dataset.letter = letter;
      btn.innerHTML = '<strong style="opacity:.7;margin-right:8px">' + letter + '.</strong>' + escHtml(q.options[letter]);
      btn.addEventListener('click', function() {
        if (state[q.id].submitted) return;
        state[q.id].chosen = letter;
        opts.querySelectorAll('.opt-btn').forEach(function(b){ b.classList.toggle('selected', b.dataset.letter === letter); });
        subBtn.disabled = false;
      });
      opts.appendChild(btn);
    });

    function doSubmit() {
      if (state[q.id].submitted) return;
      state[q.id].submitted = true;
      subBtn.style.display = 'none';
      expEl.style.display = 'block';
      opts.querySelectorAll('.opt-btn').forEach(function(b) {
        b.disabled = true;
        var l = b.dataset.letter;
        if (l === q.correct) b.className = 'opt-btn correct';
        else if (l === state[q.id].chosen) b.className = 'opt-btn wrong';
        else b.className = 'opt-btn dimmed';
      });
    }
    subBtn.addEventListener('click', doSubmit);
    section.appendChild(card);
  });

  checkBtn.addEventListener('click', function() {
    var correct = 0;
    questions.forEach(function(q) {
      if (!state[q.id].submitted) {
        state[q.id].submitted = true;
        var opEl = section.querySelector('#opts-' + q.id) || section.querySelectorAll('.q-card')[questions.indexOf(q)].querySelector('.options');
        var sb = section.querySelectorAll('.q-card')[questions.indexOf(q)].querySelector('.submit-btn');
        var ex = section.querySelectorAll('.q-card')[questions.indexOf(q)].querySelector('.explanation');
        if (sb) sb.style.display = 'none';
        if (ex) ex.style.display = 'block';
        opEl.querySelectorAll('.opt-btn').forEach(function(b) {
          b.disabled = true;
          var l = b.dataset.letter;
          if (l === q.correct) b.className = 'opt-btn correct';
          else if (l === state[q.id].chosen) b.className = 'opt-btn wrong';
          else b.className = 'opt-btn dimmed';
        });
      }
      if (state[q.id].chosen === q.correct) correct++;
    });
    var pct = Math.round(correct / questions.length * 100);
    var pass = pct >= 70;
    scoreBanner.className = 'score-banner ' + (pass ? 'pass' : 'fail');
    scoreBanner.textContent = (pass ? '🎉' : '📚') + ' Score: ' + correct + ' / ' + questions.length + ' (' + pct + '%)' + (pass ? '' : ' — review the explanations below');
    scoreBanner.style.display = 'block';
    scoreBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  return section;
}

// Build nav
var nav = document.getElementById('nav');
DAYS.forEach(function(day, i) {
  var d = new Date(day.date + 'T12:00:00');
  var label = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  var topicLine = day.text.split('\n').find(function(l){ return /^## /.test(l); }) || '';
  var topic = topicLine.replace(/^## \d+\.\s*/, '').replace(/^## /, '').replace(/[⭐🔐🛡📌☁️]/g,'').trim().slice(0,28);
  var btn = document.createElement('button');
  btn.className = 'day-btn' + (i === 0 ? ' active' : '');
  btn.dataset.date = day.date;
  btn.innerHTML = '<span class="date">' + label + '</span><span class="topics">' + escHtml(topic || 'AWS Topics') + '</span>';
  btn.addEventListener('click', function(){ renderDay(day); });
  nav.appendChild(btn);
});

DAYS.forEach(function(day, i) {

// ── Diagram zoom lightbox ────────────────────────────────────────────────────
var openDiagram = (function() {
  var overlay = document.getElementById('diagram-overlay');
  var canvas  = document.getElementById('diagram-canvas');
  var inner   = document.getElementById('diagram-inner');
  var label   = document.getElementById('zoom-label');
  var scale = 1, tx = 0, ty = 0;
  var dragging = false, lastX = 0, lastY = 0;

  function applyTransform() {
    inner.style.transform = 'translate(calc(-50% + ' + tx + 'px), calc(-50% + ' + ty + 'px)) scale(' + scale + ')';
    label.textContent = Math.round(scale * 100) + '%';
  }

  function open(svgEl) {
    scale = 1; tx = 0; ty = 0;
    inner.innerHTML = '';
    var clone = svgEl.cloneNode(true);
    clone.removeAttribute('width');
    clone.removeAttribute('height');
    clone.style.maxWidth  = 'none';
    clone.style.maxHeight = 'none';
    // Fit to 85vw / 80vh at scale 1
    var vw = window.innerWidth * 0.85;
    var vh = window.innerHeight * 0.80;
    var bb = svgEl.getBoundingClientRect();
    var natW = bb.width  || 700;
    var natH = bb.height || 400;
    var fitScale = Math.min(vw / natW, vh / natH, 2);
    clone.style.width  = (natW * fitScale) + 'px';
    clone.style.height = (natH * fitScale) + 'px';
    inner.appendChild(clone);
    applyTransform();
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function close() {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  }

  document.getElementById('overlay-close').addEventListener('click', function(e) { e.stopPropagation(); close(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') close(); });

  // Click backdrop (not controls) to close
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay || e.target === canvas) close();
  });

  document.getElementById('btn-zoom-in').addEventListener('click',  function(e) { e.stopPropagation(); scale = Math.min(scale * 1.3, 8); applyTransform(); });
  document.getElementById('btn-zoom-out').addEventListener('click', function(e) { e.stopPropagation(); scale = Math.max(scale / 1.3, 0.15); applyTransform(); });
  document.getElementById('btn-reset').addEventListener('click',    function(e) { e.stopPropagation(); scale = 1; tx = 0; ty = 0; applyTransform(); });

  // Scroll-wheel zoom
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    scale = Math.min(Math.max(scale * (e.deltaY < 0 ? 1.12 : 1/1.12), 0.15), 8);
    applyTransform();
  }, { passive: false });

  // Drag to pan
  canvas.addEventListener('mousedown', function(e) {
    if (e.target.closest('#overlay-controls') || e.target.closest('#overlay-close')) return;
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    canvas.classList.add('grabbing');
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    tx += e.clientX - lastX; ty += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    applyTransform();
  });
  window.addEventListener('mouseup', function() { dragging = false; canvas.classList.remove('grabbing'); });

  // Touch pinch + drag
  var lastDist = null, lastTX = 0, lastTY = 0;
  canvas.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) { lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY; }
    if (e.touches.length === 2) lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }, { passive: true });
  canvas.addEventListener('touchmove', function(e) {
    if (e.touches.length === 1) {
      tx += e.touches[0].clientX - lastTX; ty += e.touches[0].clientY - lastTY;
      lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY; applyTransform();
    }
    if (e.touches.length === 2) {
      var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (lastDist) { scale = Math.min(Math.max(scale * d / lastDist, 0.15), 8); applyTransform(); }
      lastDist = d;
    }
  }, { passive: true });
  canvas.addEventListener('touchend', function() { lastDist = null; });

  return open;
})();
</script>
