name: AWS Inventory

on:
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
    steps:
      - name: S3 Buckets
        run: |
          echo "## S3 BUCKETS"
          aws s3 ls

      - name: S3 Bucket Sizes
        run: |
          echo "## S3 BUCKET SIZES"
          for bucket in $(aws s3 ls | awk '{print $3}'); do
            echo -n "$bucket: "
            aws s3 ls s3://$bucket --recursive --human-readable --summarize 2>/dev/null | grep "Total Size" || echo "empty"
          done

      - name: CloudFront Distributions
        run: |
          echo "## CLOUDFRONT DISTRIBUTIONS"
          aws cloudfront list-distributions \
            --query 'DistributionList.Items[*].{ID:Id,Domain:DomainName,Status:Status,Origins:Origins.Items[0].DomainName}' \
            --output table

      - name: EC2 Instances
        run: |
          echo "## EC2 INSTANCES"
          aws ec2 describe-instances \
            --query 'Reservations[*].Instances[*].{ID:InstanceId,Type:InstanceType,State:State.Name,Name:Tags[?Key==`Name`].Value|[0],IP:PublicIpAddress}' \
            --output table

      - name: IAM Users
        run: |
          echo "## IAM USERS"
          aws iam list-users \
            --query 'Users[*].{User:UserName,Created:CreateDate,LastLogin:PasswordLastUsed}' \
            --output table

      - name: Billing (current month estimate)
        run: |
          echo "## BILLING - CURRENT MONTH"
          aws ce get-cost-and-usage \
            --time-period Start=$(date +%Y-%m-01),End=$(date +%Y-%m-%d) \
            --granularity MONTHLY \
            --metrics "UnblendedCost" \
            --query 'ResultsByTime[0].Total.UnblendedCost.{Amount:Amount,Unit:Unit}' \
            --output table \
            --region us-east-1 || echo "Cost Explorer not enabled or no data yet"
