name: Daily Summary Deploy

on:
  schedule:
    - cron: '5 10 * * 1-5'  # 12:05 Berlin time (UTC+2) = 10:05 UTC, weekdays only
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4

      - name: Check today's captions exist
        id: check
        run: |
          TODAY=$(TZ=Europe/Berlin date +%Y-%m-%d)
          CAPTIONS="server/captions/${TODAY}.txt"
          echo "today=$TODAY" >> $GITHUB_OUTPUT
          echo "captions=$CAPTIONS" >> $GITHUB_OUTPUT
          if [ -f "$CAPTIONS" ] && [ -s "$CAPTIONS" ]; then
            echo "has_captions=true" >> $GITHUB_OUTPUT
            LINES=$(wc -l < "$CAPTIONS")
            echo "✅ Found $CAPTIONS ($LINES lines)"
          else
            echo "has_captions=false" >> $GITHUB_OUTPUT
            echo "⏭️ No captions for $TODAY — skipping"
          fi

      - name: Generate summary from captions via GitHub Models
        if: steps.check.outputs.has_captions == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TODAY: ${{ steps.check.outputs.today }}
          CAPTIONS_FILE: ${{ steps.check.outputs.captions }}
        run: |
          SUMMARY_FILE="server/live-summary/${TODAY}.md"
          PROMPT_FILE=$(mktemp)
          PAYLOAD_FILE=$(mktemp)
          RESPONSE_FILE=$(mktemp)
          DEDUPED_FILE=$(mktemp)

          # Live caption capture re-appends overlapping text when it reconnects,
          # producing long runs of duplicated paragraphs. Collapse consecutive
          # duplicate lines before sending to the model — this alone tends to
          # shrink transcripts by more than half on days with reconnects.
          awk '!seen[$0]++ || $0 ~ /^\s*$|^\[/' "$CAPTIONS_FILE" > "$DEDUPED_FILE"

          # GitHub Models' free gpt-4o tier caps requests at 8000 tokens total
          # (prompt + instructions + output). Budget ~20000 chars (~5000 tokens)
          # for captions, keeping the END of the transcript (most recent content)
          # since the class builds on earlier topics and later material is what's
          # least likely to already be covered in a previous summary.
          MAX_CHARS=20000
          CAPTION_CHARS=$(wc -c < "$DEDUPED_FILE")
          if [ "$CAPTION_CHARS" -gt "$MAX_CHARS" ]; then
            echo "⚠️ Captions are ${CAPTION_CHARS} chars after dedup — truncating to last ${MAX_CHARS} chars"
            tail -c "$MAX_CHARS" "$DEDUPED_FILE" > "${DEDUPED_FILE}.trunc"
            mv "${DEDUPED_FILE}.trunc" "$DEDUPED_FILE"
          fi

          # Build prompt into a file — captions can be too large for a shell arg/env var
          {
            echo "You are a concise AWS class note-taker. Based on the following class transcript captions, write a structured markdown summary of the AWS topics covered today (${TODAY})."
            echo ""
            echo "Rules:"
            echo "- Use ## headings for each topic"
            echo "- Under each topic: bullet points for key concepts, a markdown table if comparing things, and a mermaid diagram if it helps visualise"
            echo "- Add a real-world company blockquote example for each topic (> 🏢 Real world: ...)"
            echo "- Keep it focused — no filler, no intro/outro sentences"
            echo "- Do NOT wrap in a code block — output raw markdown only"
            echo ""
            echo "Captions:"
            cat "$DEDUPED_FILE"
          } > "$PROMPT_FILE"

          # Build the JSON payload from the file (--rawfile avoids ARG_MAX / large env var limits)
          jq -n \
            --arg model "gpt-4o" \
            --rawfile content "$PROMPT_FILE" \
            --argjson max_tokens 4000 \
            '{model: $model, messages: [{role: "user", content: $content}], max_tokens: $max_tokens}' \
            > "$PAYLOAD_FILE"

          # Call GitHub Models API (gpt-4o)
          HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://models.inference.ai.azure.com/chat/completions" \
            --data-binary @"$PAYLOAD_FILE")

          SUMMARY=$(jq -r '.choices[0].message.content // empty' "$RESPONSE_FILE")

          if [ -z "$SUMMARY" ]; then
            echo "❌ GitHub Models returned empty response (HTTP $HTTP_CODE)"
            cat "$RESPONSE_FILE"
            exit 1
          fi

          # Write summary file with timestamp header
          echo "<!-- updated: $(date -u +%Y-%m-%dT%H:%M:%S.000Z) -->" > "$SUMMARY_FILE"
          echo "$SUMMARY" >> "$SUMMARY_FILE"
          echo "✅ Summary written to $SUMMARY_FILE"

      - uses: actions/setup-node@v4
        if: steps.check.outputs.has_captions == 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.check.outputs.has_captions == 'true'
        run: npm install
        working-directory: ./server

      - name: Build static site
        if: steps.check.outputs.has_captions == 'true'
        run: node server/build-site.js

      - name: Deploy to S3
        if: steps.check.outputs.has_captions == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          aws s3 cp dist/index.html s3://dci-class-summaries-eu/index.html \
            --content-type "text/html"
          echo "✅ Deployed summary for ${{ steps.check.outputs.today }}"

      - name: Invalidate CloudFront cache
        if: steps.check.outputs.has_captions == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1I564SWI1OAU9 \
            --paths "/*"

      - name: Commit updated summary
        if: steps.check.outputs.has_captions == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server/live-summary/${{ steps.check.outputs.today }}.md
          git diff --staged --quiet || git commit -m "Auto-update summary for ${{ steps.check.outputs.today }}"
          git push
